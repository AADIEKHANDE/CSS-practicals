<script>
    var a=parseInt(prompt("Enter your age"));
    if(a>=18)
    {
        alert("You are Adult");
    }
    else
    {
        alert("You are not Adult");
    }
    for(var i=0;i<a;i++)
    {
        document.write(i+1 +"<br>");
    }
</script>
