<script>
    var str = "Hello World";
    var str2 = " From JavaScript";

    document.writeln("Str1 :"+str);
    document.writeln("<br>Str2 :"+str2);
    
    document.writeln("<br><br> concat(str2) : "+str.concat(str2));
    document.writeln("<br> using concatenation (+) operator : "+str+str2);
    document.writeln("<br>charAt(6) : "+str.charAt(6));
    document.writeln("<br> indexOf('l') : "+str.indexOf('l'));
    document.writeln("<br> lastIndexOf('l') : "+str.lastIndexOf('l'));
    document.writeln("<br> charcodeAt() : "+str.charCodeAt()); 
    document.writeln("<br> search('d') : "+str.search('d')); 
    document.writeln("<br> split('') : "+str.split('')); 
    document.writeln("<br> substring(0,4) : "+str.substring(0,4)); 
    document.writeln("<br> toUpperCase() : "+str.toUpperCase()); 
    document.writeln("<br> toLocaleLowerCase() : "+str.toLocaleLowerCase()); 
    document.writeln("<br> charCodeAt(2) : "+str.charCodeAt(2));     
    
</script>
